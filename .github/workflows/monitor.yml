name: Uptime Monitor & Auto-Redeploy

on:
  schedule:
    # Every 6 hours — keeps Pages warm and catches any outage quickly
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: write   # needed to dispatch deploy.yml

jobs:
  check-and-heal:
    runs-on: ubuntu-latest
    steps:
      - name: Check site HTTP status
        id: probe
        run: |
          URL="https://yehosua.love/"
          STATUS=$(curl -s -o /tmp/body -w "%{http_code}" --max-time 20 --retry 2 "$URL")
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          echo "HTTP $STATUS for $URL"
          if [ "$STATUS" != "200" ]; then
            echo "::warning::Site returned HTTP $STATUS — triggering redeploy"
          else
            echo "✓ Site healthy"
          fi

      - name: Trigger redeploy if site is down
        if: steps.probe.outputs.status != '200'
        uses: actions/github-script@v7
        with:
          script: |
            console.log('Site unhealthy — dispatching deploy.yml');
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy.yml',
              ref: 'main'
            });
            console.log('Redeploy dispatched successfully');
